# ============================================================
#  Personal Food - Spring Boot Configuration
#  Railway Production Environment
# ============================================================

# --- Server ---
server.port=8080

# --- MySQL DataSource (Railway environment variables) ---
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- Timezone ---
spring.jackson.time-zone=America/Sao_Paulo

# --- Spring Mail (SMTP) ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- OAuth2 / Google Login ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# --- Mercado Pago ---
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}

# --- Logging ---
logging.level.root=WARN
logging.level.com.pf.PersonalFood=INFO
logging.level.org.springframework.security=WARN
