# Dialeto do Hibernate para Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configurações de conexão com o banco de dados PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/personal_food}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

# Informa ao Spring qual driver usar
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate (muito úteis para o desenvolvimento)
# O 'update' faz o Spring criar ou atualizar as tabelas do banco automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do Java os comandos SQL que o Spring está executando (bom para debugar)
spring.jpa.show-sql=true

# Limite de tamanho para uploads de formulários
server.tomcat.max-http-form-post-size=10MB

# Mercado Pago - Configurações de API
mercadopago.access-token=${MP_TOKEN}

# Configurações do OAuth2 Google
spring.security.oauth2.client.registration.google.client-id={GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret={GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile, email

# Email - Configurações para envio de emails
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pfpersonalfood@gmail.com
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configurações de nomeação do Hibernate para evitar problemas com nomes de tabelas e colunas
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# IA Gemini - Configuração para Google AI Studio (API Key)
gemini.api.key=${GEMINI_API_KEY}