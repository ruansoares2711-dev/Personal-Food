# URL de conexão do seu banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/PersonalFood?createDatabaseIfNotExist=true&serverTimezone=UTC

# Suas credenciais do MySQL
spring.datasource.username=root
spring.datasource.password=Ruan2711!

# Informa ao Spring qual driver usar
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do Hibernate (muito úteis para o desenvolvimento)
# O 'update' faz o Spring criar ou atualizar as tabelas do banco automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra no console do Java os comandos SQL que o Spring está executando (bom para debugar)
spring.jpa.show-sql=true