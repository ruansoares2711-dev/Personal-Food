<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Food | Meu Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/personalFood/PersonalFoodFavIcon32x32-removebg-preview.png">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-main: #000000;
            --nav-bg: #113c0b;
            --logo-bg: #d1c115;
            --card-bg: #0e290a;
            --btn-green: #a7c938;
            --btn-green-hover: #b8db40;
            --red-cta: #d30018;
            --text-white: #FFFFFF;
            --font-main: 'Poppins', sans-serif;
            --border-color: #2a5a22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-white); font-family: var(--font-main); min-height: 100vh; position: relative; }

        .bg-side { position: fixed; top: 0; bottom: 0; width: 25vw; z-index: -1; opacity: 0.3; background-size: cover; background-position: center; }
        .bg-left { left: 0; background-image: url('https://images.unsplash.com/photo-1490818387583-1b5f2dd061b1?q=80&w=600&auto=format&fit=crop'); -webkit-mask-image: linear-gradient(to right, black 10%, transparent 100%); mask-image: linear-gradient(to right, black 10%, transparent 100%); }
        .bg-right { right: 0; background-image: url('https://images.unsplash.com/photo-1596683839213-9f864bc39294?q=80&w=600&auto=format&fit=crop'); -webkit-mask-image: linear-gradient(to left, black 10%, transparent 100%); mask-image: linear-gradient(to left, black 10%, transparent 100%); }

        /* NAVBAR PADRÃO (CONSOLIDADA) */
        .navbar { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background-color: var(--nav-bg); display: flex; align-items: center; justify-content: space-between; z-index: 1000; padding: 0 30px 0 0; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
        .logo-wrapper { height: 100%; background-color: var(--logo-bg); padding: 10px 50px 10px 25px; border-radius: 0 50px 50px 0; display: flex; align-items: center; cursor: pointer; }
        .logo-wrapper img { height: 100%; width: 165px; object-fit: contain; margin-right: 12px; }
        .logo-text { color: #ffffff; font-size: 1.3rem; font-weight: 800; line-height: 1.1; }
        .logo-text span { display: block; font-size: 0.9rem; font-weight: 600; }
        .nav-links { display: flex; list-style: none; gap: 25px; align-items: center; }
        .nav-links a { color: #8eb021; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .user-greeting { font-weight: 700; font-size: 0.95rem; color: #fff; }
        .btn-panel-nav { background-color: var(--btn-green); color: #113c0b; border: none; padding: 8px 25px; border-radius: 25px; font-weight: 800; cursor: pointer; }
        .btn-exit { background-color: transparent; color: var(--red-cta); border: 2px solid var(--red-cta); padding: 6px 20px; border-radius: 25px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-exit:hover { background-color: var(--red-cta); color: #fff; }

        /* DASHBOARD CONTENT */
        .dashboard-container { padding-top: 120px; padding-bottom: 60px; max-width: 1100px; margin: 0 auto; padding-inline: 20px; position: relative; z-index: 10; }
        .header-painel { margin-bottom: 30px; border-bottom: 2px solid var(--border-color); padding-bottom: 20px; }
        .header-painel h1 { font-size: 2.2rem; font-weight: 800; color: var(--btn-green); }

        .dash-tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--border-color); }
        .tab-btn { background: transparent; color: #888; border: none; padding: 10px 20px; font-size: 1.1rem; font-weight: 700; cursor: pointer; position: relative; }
        .tab-btn.active { color: var(--btn-green); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background-color: var(--btn-green); }
        
        .tab-content { display: none; animation: fadeIn 0.4s ease forwards; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ABA RESUMO (Cards Limpos) */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 40px;}
        .dash-card { background-color: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid var(--border-color); box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; min-height: 200px; }
        .dash-card-content { z-index: 2; position: relative; }
        .dash-card h3 { font-size: 1.3rem; margin-bottom: 15px; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px;}
        .empty-state { color: #88a483; padding: 10px 0 20px 0; font-size: 0.95rem; font-style: italic; }
        .btn-explorar-card { background-color: var(--btn-green); color: #113c0b; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 700; display: inline-block; }
        .tomatito-card-placeholder { position: absolute; right: -10px; bottom: 0px; width: 100px; height: 120px; z-index: 1; pointer-events: none; opacity: 0.7; }

        /* LISTA DE EVENTOS */
        .pedido-card { background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .pedido-header { display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; }
        .badge.espera { background-color: #f39c12; color: #fff; }
        .badge.orcamento { background-color: #3498db; color: #fff; }
        .badge.confirmado { background-color: #2ecc71; color: #000; }
        .proposta-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border-left: 4px solid var(--btn-green); margin-top: 10px; }
        .actions-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn-aceitar { background: var(--btn-green); color: #113c0b; border: none; padding: 10px 25px; border-radius: 20px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-recusar-card { background: transparent; border: 2px solid var(--red-cta); color: var(--red-cta); padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; }

        /* ABA PERFIL */
        .profile-section { display: grid; grid-template-columns: 250px 1fr; gap: 40px; background: var(--card-bg); padding: 35px; border-radius: 15px; border: 1px solid var(--border-color); }
        .avatar-circle { width: 160px; height: 160px; border-radius: 50%; border: 4px solid var(--btn-green); margin: 0 auto 20px; overflow: hidden; background: #222; position: relative; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; font-weight: 700;}
        .input-group input { background: rgba(0,0,0,0.4); border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .btn-salvar { background: var(--btn-green); color: #113c0b; border: none; padding: 14px; border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }

        /* CHATBOT */
        .helper-container { position: fixed; bottom: 30px; right: 40px; z-index: 100; cursor: pointer; }
        .helper-wrapper { display: flex; flex-direction: column; align-items: center; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
        .speech-bubble { background-color: #000; border: 3px solid var(--red-cta); border-radius: 50%; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; font-size: 0.75rem; font-weight: 800; position: relative; margin-bottom: 10px; }
        .speech-bubble::before { content: ''; position: absolute; bottom: -11px; right: 25px; width: 20px; height: 20px; background: #000; border-bottom: 3px solid var(--red-cta); border-right: 3px solid var(--red-cta); transform: rotate(45deg); }
        .tomatito { width: 90px; filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.8)); }

        /* Estilização Customizada do SweetAlert */
        .swal2-popup-custom { background: #0e290a !important; border: 2px solid #a7c938 !important; color: white !important; border-radius: 15px !important; }
        .swal2-title-custom { color: #a7c938 !important; font-family: 'Poppins', sans-serif !important; }
        .swal2-confirm-custom { background-color: #a7c938 !important; color: #113c0b !important; font-weight: 800 !important; border-radius: 25px !important; }
        .swal2-cancel-custom { background: transparent !important; border: 2px solid #d30018 !important; color: #d30018 !important; border-radius: 25px !important; }
    </style>
</head>
<body>

    <div class="bg-side bg-left"></div>
    <div class="bg-side bg-right"></div>

    <nav class="navbar">
        <div class="logo-wrapper" onclick="location.href='../index.html'">
            <img src="../assets/personalFood/PersonalFoodIcon.png" alt="Logo">
            <div class="logo-text">PERSONAL<span>FOOD</span></div>
        </div>
        
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="chefs.html">Chef 's</a></li>
            <li><a href="#">Cursos</a></li>
            <li><a href="#">Receitas</a></li>
            <li><a href="#">Sobre nós</a></li>
        </ul>

        <div class="nav-right">
            <span class="user-greeting" id="nav-user-name">Olá!</span>
            <button class="btn-panel-nav">Meu Painel</button>
            <button class="btn-exit" onclick="fazerLogout()">Sair</button>
        </div>
    </nav>

    <main class="dashboard-container">
        <div class="header-painel">
            <h1 id="welcome-title">Meu Painel</h1>
        </div>

        <div class="dash-tabs">
            <button class="tab-btn active" onclick="switchTab('resumo', this)">Resumo</button>
            <button class="tab-btn" onclick="switchTab('pedidos', this)">Minhas Solicitações</button>
            <button class="tab-btn" onclick="switchTab('perfil', this)">Editar Perfil</button>
        </div>

        <div id="tab-resumo" class="tab-content active">
            <div class="dashboard-grid">
                <div class="dash-card">
                    <div class="dash-card-content">
                        <h3>Receitas Salvas</h3>
                        <div class="empty-state">Seu caderno de receitas está vazio.</div>
                        <a href="receitas.html" class="btn-explorar-card">Explorar Receitas</a>
                    </div>
                    <img src="../assets/tomatito/Tomatito-Receitas-Home-Icon.png" class="tomatito-card-placeholder">
                </div>
                <div class="dash-card">
                    <div class="dash-card-content">
                        <h3>Meus Cursos</h3>
                        <div class="empty-state">Você não está matriculado em nenhum curso.</div>
                        <a href="cursos.html" class="btn-explorar-card">Ver Cursos</a>
                    </div>
                    <img src="../assets/tomatito/Tomatito-Cursos-Home-Icon.png" class="tomatito-card-placeholder">
                </div>
            </div>
        </div>

        <div id="tab-pedidos" class="tab-content">
            <div id="lista-pedidos"></div>
        </div>

        <div id="tab-perfil" class="tab-content">
            <div class="profile-section">
                <div style="text-align: center;">
                    <div class="avatar-circle">
                        <img id="foto-preview" src="https://www.w3schools.com/howto/img_avatar.png">
                    </div>
                    <input type="file" id="input-foto" style="display:none" accept="image/*" onchange="previewFoto(event)">
                    <button class="btn-panel-nav" onclick="document.getElementById('input-foto').click()">Alterar Foto</button>
                </div>
                <form onsubmit="salvarPerfil(event)">
                    <div class="input-group">
                        <label>Nome Completo</label>
                        <input type="text" id="perfil-nome" required>
                    </div>
                    <div class="input-group">
                        <label>E-mail de Cadastro</label>
                        <input type="email" id="perfil-email" readonly style="opacity: 0.5">
                    </div>
                    <button type="submit" class="btn-salvar">Gravar Alterações</button>
                </form>
            </div>
        </div>
    </main>

    <div class="helper-container">
        <div class="helper-wrapper">
            <div class="speech-bubble">Oi eu sou o<br>Tomatito<br>Precisa de<br>ajuda?</div>
            <img src="../assets/tomatito/Tomatito-Chatbot-Icon.png" class="tomatito">
        </div>
    </div>

    <script>
        let clienteId = null;
        let fotoBase64 = null;

        // Configuração Global do SweetAlert para combinar com o tema
        const CustomSwal = Swal.mixin({
            customClass: {
                popup: 'swal2-popup-custom',
                title: 'swal2-title-custom',
                confirmButton: 'swal2-confirm-custom',
                cancelButton: 'swal2-cancel-custom'
            },
            buttonsStyling: false
        });

        document.addEventListener("DOMContentLoaded", () => {
            const user = JSON.parse(localStorage.getItem('usuarioLogado'));
            if (!user) { window.location.href = "registerLogin.html"; return; }

            clienteId = user.id;
            document.getElementById('nav-user-name').innerText = `Olá, ${user.nome.split(' ')[0]}!`;
            document.getElementById('welcome-title').innerText = `Painel de ${user.nome.split(' ')[0]}`;
            
            document.getElementById('perfil-nome').value = user.nome;
            document.getElementById('perfil-email').value = user.email;

            if (user.fotoPerfil) {
                document.getElementById('foto-preview').src = user.fotoPerfil;
                fotoBase64 = user.fotoPerfil;
            }

            carregarPedidos();
        });

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            btn.classList.add('active');
        }

        async function carregarPedidos() {
            try {
                const res = await fetch(`http://localhost:8080/api/pedidos/cliente/${clienteId}`);
                if (res.ok) {
                    const pedidos = await res.json();
                    const container = document.getElementById('lista-pedidos');
                    container.innerHTML = '';

                    if (pedidos.length === 0) {
                        container.innerHTML = '<p style="text-align:center; padding:40px; color:#888;">Nenhuma solicitação encontrada.</p>';
                        return;
                    }

                    pedidos.reverse().forEach(p => {
                        const chefe = p.chefe?.usuario?.nome || "Chef Parceiro";
                        let statusBadge = '';
                        let conteudoExtra = '';

                        if (p.status === 'NOVA_SOLICITACAO') {
                            statusBadge = '<span class="badge espera">Aguardando Chef</span>';
                        } else if (p.status === 'ORCAMENTO_ENVIADO') {
                            statusBadge = '<span class="badge orcamento">Orçamento Recebido</span>';
                            conteudoExtra = `
                                <div class="proposta-box">
                                    <p><strong>Proposta do Chef:</strong> ${p.propostaOrcamento}</p>
                                    <p style="font-size: 1.3rem; margin-top:10px; font-weight:800;">Valor: R$ ${p.valorOrcamento.toFixed(2)}</p>
                                </div>
                                <div class="actions-row">
                                    <button class="btn-aceitar" onclick="responderOrcamento(${p.id}, 'ACEITO')">Aceitar e Assinar</button>
                                    <button class="btn-recusar-card" onclick="responderOrcamento(${p.id}, 'RECUSADO')">Recusar</button>
                                </div>`;
                        } else if (p.status === 'CONFIRMADO') {
                            statusBadge = '<span class="badge confirmado">Confirmado</span>';
                        } else {
                            statusBadge = '<span class="badge recusado">Cancelado</span>';
                        }

                        container.innerHTML += `
                            <div class="pedido-card">
                                <div class="pedido-header">
                                    <div>
                                        <strong>Evento com Chef ${chefe}</strong>
                                        <p style="font-size: 0.85rem; color: #888;">Data: ${p.dataEvento} | Local: ${p.localEvento.split('|')[1] || p.localEvento}</p>
                                    </div>
                                    ${statusBadge}
                                </div>
                                ${conteudoExtra}
                            </div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function responderOrcamento(id, resposta) {
            const confirmacao = await CustomSwal.fire({
                title: resposta === 'ACEITO' ? 'Aceitar Proposta?' : 'Recusar Proposta?',
                text: resposta === 'ACEITO' ? "Ao aceitar, você confirma o evento com o Chef." : "Deseja realmente recusar este orçamento?",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: resposta === 'ACEITO' ? 'Sim, contratar!' : 'Sim, recusar',
                cancelButtonText: 'Voltar'
            });

            if (confirmacao.isConfirmed) {
                try {
                    const res = await fetch(`http://localhost:8080/api/pedidos/${id}/responder`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ resposta: resposta })
                    });
                    if (res.ok) {
                        CustomSwal.fire('Sucesso!', resposta === 'ACEITO' ? 'Evento confirmado!' : 'Orçamento recusado.', 'success');
                        carregarPedidos();
                    }
                } catch (e) {
                    CustomSwal.fire('Erro', 'Falha na conexão com o servidor.', 'error');
                }
            }
        }

        function previewFoto(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('foto-preview').src = e.target.result;
                    fotoBase64 = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        async function salvarPerfil(e) {
            e.preventDefault();
            const dados = { nome: document.getElementById('perfil-nome').value, fotoPerfil: fotoBase64 };

            try {
                const res = await fetch(`http://localhost:8080/api/usuarios/perfil/${clienteId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (res.ok) {
                    const usuarioAtualizado = await res.json();
                    localStorage.setItem('usuarioLogado', JSON.stringify(usuarioAtualizado));
                    CustomSwal.fire('Sucesso!', 'Perfil e foto atualizados!', 'success');
                    document.getElementById('nav-user-name').innerText = `Olá, ${usuarioAtualizado.nome.split(' ')[0]}!`;
                }
            } catch (e) {
                CustomSwal.fire('Erro', 'Não foi possível salvar.', 'error');
            }
        }

        function fazerLogout() {
            CustomSwal.fire({
                title: 'Sair da conta?',
                text: "Você será deslogado do sistema.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sair',
                cancelButtonText: 'Ficar'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('usuarioLogado');
                    window.location.href = "registerLogin.html";
                }
            });
        }
    </script>
</body>
</html>
