<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Food | Nova Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #000000;
            --card-bg: #0e290a;
            --btn-green: #a7c938;
            --text-white: #FFFFFF;
            --font-main: 'Poppins', sans-serif;
            --border-color: #2a5a22;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: var(--btn-green); margin-bottom: 20px; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; }
        
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--btn-green); }

        .btn-salvar {
            width: 100%;
            padding: 14px;
            background: var(--btn-green);
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-salvar:hover { transform: scale(1.02); background: #b8db40; }

        /* Toast simples para feedback */
        #toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 15px 25px; border-radius: 8px;
            display: none; background: var(--card-bg);
            border-left: 5px solid var(--btn-green);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Nova Senha</h2>
        <p>Digite sua nova senha abaixo para recuperar o acesso.</p>

        <div class="input-group">
            <label>Nova Senha</label>
            <input type="password" id="nova-senha" placeholder="********">
        </div>

        <div class="input-group">
            <label>Confirmar Senha</label>
            <input type="password" id="confirmar-senha" placeholder="********">
        </div>

        <button class="btn-salvar" onclick="salvarNovaSenha()">Redefinir Senha</button>
    </div>

    <div id="toast"></div>

    <script>
        // Pega o token da URL (?token=xyz...)
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function salvarNovaSenha() {
            const novaSenha = document.getElementById('nova-senha').value;
            const confirma = document.getElementById('confirmar-senha').value;

            if (novaSenha !== confirma) {
                alert("As senhas não coincidem!");
                return;
            }

            if (novaSenha.length < 4) {
                alert("Senha muito curta!");
                return;
            }

            try {
                const response = await fetch('/api/usuarios/confirmar-nova-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, novaSenha: novaSenha })
                });

                const msg = await response.text();

                if (response.ok) {
                    alert("Sucesso! Você será redirecionado para o login.");
                    window.location.href = "registerLogin.html";
                } else {
                    alert("Erro: " + msg);
                }
            } catch (e) {
                alert("Erro ao conectar com o servidor.");
            }
        }
    </script>
</body>
</html>
