# ============================================================
#  Personal Food - Spring Boot Configuration
#  Ambiente de Produção (Render / Cloud)
# ============================================================

# --- Servidor ---
# O Render injeta automaticamente uma variável chamada PORT.
# ${PORT:8080} significa: usa a variável PORT; se não existir (ex: no teu PC), usa a 8080.
server.port=${PORT:8080}

# --- Base de Dados (MySQL) ---
# As credenciais são chamadas de forma segura através de Variáveis de Ambiente.
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# Nota: Em produção real com clientes, o ideal é mudar de 'update' para 'validate' ou 'none' 
# e usar ferramentas como o Flyway para evitar que o Hibernate apague/altere tabelas por engano.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# --- Fuso Horário ---
spring.jackson.time-zone=America/Sao_Paulo

# ============================================================
#  APIs e Integrações (Configurar no painel do Render)
# ============================================================

# --- Spring Mail (SMTP) ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- OAuth2 / Google Login ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# --- Mercado Pago ---
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}

# --- Logging ---
logging.level.root=WARN
logging.level.com.pf.PersonalFood=INFO
logging.level.org.springframework.security=WARN
