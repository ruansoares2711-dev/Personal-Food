# ========================================
# DEVELOPMENT - MySQL Local Configuration
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/personal_food?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Ruan2711!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA/Hibernate Configuration
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# ========================================
# SERVER Configuration (DEV)
# ========================================
server.port=8080
server.tomcat.max-http-form-post-size=10MB

# ========================================
# EMAIL Configuration
# ========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pfpersonalfood@gmail.com
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ========================================
# OAUTH2 Google Configuration
# ========================================
spring.security.oauth2.client.registration.google.client-id=TESTE
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ========================================
# APPLICATION Configuration
# ========================================
app.base-url=http://localhost:8080

# ========================================
# EXTERNAL APIs Configuration
# ========================================
mercadopago.access-token=${MP_TOKEN}
gemini.api.key=${GEMINI_API_KEY}
