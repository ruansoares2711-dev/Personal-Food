<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Food | Encontre o Chef Ideal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/personalFood/PersonalFoodFavIcon32x32-removebg-preview.png">
    <style>
        /* =========================================
           VARIÁVEIS DE COR E ESTILOS GLOBAIS
        ========================================= */
        :root {
            --bg-color: #000000;
            --nav-bg: #113c0b;
            --logo-bg: #d1c115;
            --primary-green: #9cbd28;
            --dark-green: #092a0e;
            --filter-bg: #8c8c8c;
            --card-bg: #4a4a4a;
            --card-border: #6b6b6b;
            --btn-red: #c8102e;
            --btn-red-hover: #a00d25;
            --text-light: #ffffff;
            --star-color: #f5c518;
            
            --btn-green: #a7c938; 
            --btn-green-hover: #b8db40;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--text-light); padding-bottom: 50px; overflow-x: hidden;
        }

        /* =========================================
           NAVBAR
        ========================================= */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; background-color: var(--nav-bg);
            display: flex; align-items: center; justify-content: space-between; z-index: 1000; padding-right: 30px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-wrapper {
            height: 100%; background-color: var(--logo-bg); padding: 10px 40px 10px 20px;
            border-radius: 0 50px 50px 0; display: flex; align-items: center; justify-content: center;
        }

        .logo-wrapper img { height: 100%; width: 165px; object-fit: contain; margin-right: 12px; }
        .logo-text { color: #ffffff; font-size: 1.3rem; font-weight: 800; line-height: 1; display: flex; flex-direction: column; justify-content: center; }
        .logo-text span { font-weight: 500; font-size: 0.95rem; }

        .nav-links { display: flex; list-style: none; gap: 40px; align-items: center; }
        .nav-links a { color: var(--text-light); text-decoration: none; font-weight: 700; font-size: 1rem; transition: color 0.2s; }
        .nav-links a:hover { color: var(--btn-green); }

        .btn-entrar {
            background-color: var(--btn-green); color: #113c0b; border: none; padding: 10px 30px;
            border-radius: 25px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-entrar:hover { background-color: var(--btn-green-hover); transform: scale(1.05); }

        .menu-toggle { display: none; flex-direction: column; cursor: pointer; gap: 6px; z-index: 1001; }
        .menu-toggle span { width: 30px; height: 3px; background-color: var(--text-light); border-radius: 3px; transition: 0.3s; }
        .mobile-only { display: none; }

        /* --- Main Section --- */
        .page-section { max-width: 1200px; margin: 0 auto; padding: 120px 20px 40px 20px; }
        .section-title { text-align: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- Filter Bar --- */
        .filter-container { display: flex; justify-content: center; margin-bottom: 40px; }
        .filter-bar-bg { background-color: var(--filter-bg); padding: 10px 30px; border-radius: 50px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .filter-btn {
            background-color: transparent; color: #1a1a1a; border: 2px solid var(--dark-green); padding: 8px 25px;
            border-radius: 25px; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .filter-btn:hover { background-color: rgba(9, 42, 14, 0.1); }
        .filter-btn.active { background-color: var(--dark-green); color: white; }

        /* --- Grid & Cards --- */
        .grid-chefs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }

        .chef-card {
            background-color: var(--card-bg); border-radius: 12px; border: 1px solid var(--card-border);
            overflow: hidden; display: flex; flex-direction: column; transition: transform 0.3s;
        }
        .chef-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(156, 189, 40, 0.2); }
        .chef-card img.chef-img { width: 100%; height: 180px; object-fit: cover; }
        
        .card-content { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; align-items: center; text-align: center; }
        .chef-card h4 { font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; width: 100%;}
        .stars { color: var(--star-color); font-size: 1.2rem; margin-bottom: 12px; letter-spacing: 2px; }
        
        .badge-green {
            background-color: var(--primary-green); color: white; padding: 6px 10px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; width: 100%;
        }

        .btn-red {
            background-color: var(--btn-red); color: white; border: none; padding: 10px 0; border-radius: 25px;
            font-weight: 800; font-size: 1rem; cursor: pointer; width: 80%; margin: auto auto 5px auto; transition: background 0.3s;
        }
        .btn-red:hover { background-color: var(--btn-red-hover); }

        /* --- Loading e Placeholder --- */
        .loading-msg { grid-column: 1 / -1; text-align: center; font-size: 1.2rem; color: #a0a0a0; padding: 40px; }

        /* --- Custom Modal --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 12px; text-align: center; border: 2px solid var(--primary-green); max-width: 400px; width: 90%; }
        .modal-content h3 { margin-bottom: 15px; color: white; }
        .modal-close { background: var(--btn-red); color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* =========================================
           RESPONSIVIDADE
        ========================================= */
        @media (max-width: 1024px) { .grid-chefs { grid-template-columns: repeat(3, 1fr); } .nav-links { gap: 20px; } .logo-wrapper img { width: 140px; } }
        @media (max-width: 850px) { .grid-chefs { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            .navbar { padding-right: 20px; } .logo-wrapper { padding: 10px 20px 10px 10px; border-radius: 0 35px 35px 0; } .logo-wrapper img { width: 110px; }
            .logo-text { font-size: 1rem; } .logo-text span { font-size: 0.8rem; } .menu-toggle { display: flex; } .navbar > .btn-entrar { display: none; }
            .nav-links { position: fixed; top: 80px; left: -100%; width: 100%; height: calc(100vh - 80px); background-color: var(--nav-bg); flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; gap: 30px; transition: left 0.3s ease-in-out; }
            .nav-links.active { left: 0; } .nav-links a { font-size: 1.2rem; } .mobile-only { display: block; margin-top: 20px; }
            .menu-toggle.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); } .menu-toggle.active span:nth-child(2) { opacity: 0; } .menu-toggle.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
            .section-title { font-size: 2rem; } .filter-bar-bg { border-radius: 20px; padding: 15px; gap: 10px; } .filter-btn { padding: 8px 15px; font-size: 0.8rem; }
        }
        @media (max-width: 480px) { .grid-chefs { grid-template-columns: 1fr; } .navbar { padding-right: 15px; } .btn-red { width: 100%; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-wrapper">
            <img src="../assets/personalFood/PersonalFoodIcon.png" alt="Personal Food Icon" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Chef_icon.svg/1024px-Chef_icon.svg.png'; this.style.filter='brightness(0) invert(1)';">
            <div class="logo-text">PERSONAL<span>FOOD</span></div>
        </div>
        
        <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>

        <ul class="nav-links" id="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="chefs.html" style="color: var(--btn-green);">Chef 's</a></li>
            <li><a href="cursos.html">Cursos</a></li>
            <li><a href="receitas.html" >Receitas</a></li>
            <li><a href="impacta.html">PF Impacta</a></li>
            <li><a href="sobre.html">Sobre nós</a></li>
            <li class="mobile-only" id="menu-mobile-login">
                <button class="btn-entrar" onclick="location.href='registerLogin.html'">Entrar</button>
            </li>
        </ul>

        <button class="btn-entrar" id="btn-login-desk" onclick="location.href='registerLogin.html'">Entrar</button>
    </nav>

    <section id="chefs" class="page-section">
        <h2 class="section-title">ENCONTRE O CHEF IDEAL PARA VOCÊ!</h2>
        
        <div class="filter-container">
            <div class="filter-bar-bg">
                <button class="filter-btn active" onclick="setFilter(this, 'todos')">TODOS</button>
                <button class="filter-btn" onclick="setFilter(this, 'eventos')">EVENTOS</button>
                <button class="filter-btn" onclick="setFilter(this, 'particular')">PARTICULAR</button>
                <button class="filter-btn" onclick="setFilter(this, 'vegano')">VEGANO</button>
                <button class="filter-btn" onclick="setFilter(this, 'corporativo')">CORPORATIVO</button>
            </div>
        </div>

        <div class="grid-chefs" id="grid-chefs">
            <div class="loading-msg">Buscando os melhores chefs da região...</div>
        </div>
    </section>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-text">Ação realizada!</h3>
            <button class="modal-close" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script>
        // Lógica do Menu Mobile
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // Troca o botão Entrar por "Painel" se o usuário estiver logado
        document.addEventListener("DOMContentLoaded", () => {
            const usuarioJSON = localStorage.getItem('usuarioLogado');
            if (usuarioJSON) {
                const usuario = JSON.parse(usuarioJSON);
                let linkPainel = 'painel-cliente.html';
                if(usuario.tipo === 'CHEFE') linkPainel = 'painel-chefe.html';
                if(usuario.tipo === 'ADMIN') linkPainel = 'painel-admin.html';
                
                const btnDesk = document.getElementById('btn-login-desk');
                btnDesk.innerText = "Meu Painel";
                btnDesk.onclick = () => location.href = linkPainel;

                const liMobile = document.getElementById('menu-mobile-login');
                liMobile.innerHTML = `<button class="btn-entrar" onclick="location.href='${linkPainel}'">Meu Painel</button>`;
            }

            // Inicia a busca no banco de dados
            carregarChefes();
        });

        // ==========================================
        // INTEGRAÇÃO COM O BACK-END
        // ==========================================
        let listaGlobalChefes = [];

        async function carregarChefes() {
            const grid = document.getElementById('grid-chefs');
            
            try {
                const resposta = await fetch('http://localhost:8080/api/chefes');
                if (resposta.ok) {
                    const dados = await resposta.json();
                    
                    // Filtra para exibir APENAS quem está com a vitrine ativada
                    listaGlobalChefes = dados.filter(chefe => chefe.ativoVitrine === true);
                    renderizarChefes(listaGlobalChefes);
                } else {
                    grid.innerHTML = '<div class="loading-msg">Erro ao carregar o catálogo de chefs.</div>';
                }
            } catch (erro) {
                console.error("Erro de conexão", erro);
                grid.innerHTML = '<div class="loading-msg">Servidor offline. Verifique o Spring Boot.</div>';
            }
        }

        function renderizarChefes(lista) {
            const grid = document.getElementById('grid-chefs');
            grid.innerHTML = '';

            if (lista.length === 0) {
                grid.innerHTML = '<div class="loading-msg">Nenhum chef encontrado para esta categoria.</div>';
                return;
            }

            lista.forEach(chefe => {
                // Monta os dados para exibição (trata valores nulos com padrões)
                const nomeCompleto = chefe.usuario ? chefe.usuario.nome : 'Chef Parceiro';
                const primeiroNome = nomeCompleto.split(' ')[0];
                
                // Se não tiver foto no banco, usa uma genérica
                const foto = chefe.fotoPerfil || 'https://images.unsplash.com/photo-1577219491135-ce391730fb2c?auto=format&fit=crop&w=500&q=80'; 
                const especialidade = chefe.especialidade || 'Culinária Geral';
                const nota = chefe.notaReputacao ? chefe.notaReputacao.toFixed(1) : '5.0';
                
                // Criação simples de estrelinhas visuais
                let estrelasHtml = '★★★★★';
                if (nota < 5.0) estrelasHtml = '★★★★☆';
                if (nota < 4.0) estrelasHtml = '★★★☆☆';

                // Desenha o Card no HTML
                const card = document.createElement('div');
                card.className = 'chef-card';
                card.innerHTML = `
                    <img class="chef-img" src="${foto}" alt="Chef ${primeiroNome}">
                    <div class="card-content">
                        <h4>Chef ${nomeCompleto}</h4>
                        <div class="stars" title="Nota: ${nota}">${estrelasHtml}</div>
                        <div class="badge-green">${especialidade}</div>
                        <button class="btn-red" onclick="verPerfilChefe(${chefe.id}, '${nomeCompleto}')">Ver Perfil</button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // ==========================================
        // LÓGICA DO FILTRO
        // ==========================================
        function setFilter(clickedElement, tag) {
            // Atualiza a cor do botão selecionado
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            clickedElement.classList.add('active');

            // Filtra os cards baseados na tag selecionada
            if (tag === 'todos') {
                renderizarChefes(listaGlobalChefes);
            } else {
                // A tag do banco precisa conter a tag do botão (ex: 'vegano')
                const filtrados = listaGlobalChefes.filter(chefe => {
                    if(!chefe.tagsAtendimento) return false;
                    return chefe.tagsAtendimento.toLowerCase().includes(tag.toLowerCase());
                });
                renderizarChefes(filtrados);
            }
        }

        // ==========================================
        // NAVEGAÇÃO E MODAL
        // ==========================================
        function verPerfilChefe(chefeId, nome) {
            window.location.href = `perfil-chefe.html?id=${chefeId}`;
        }

        function showMessage(text) {
            document.getElementById('modal-text').innerText = text;
            document.getElementById('custom-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('custom-modal').style.display = 'none';
        }
    </script>
</body>
</html>
