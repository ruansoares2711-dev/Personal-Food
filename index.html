<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Food | Encontre o Chef Ideal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/personalFood/PersonalFoodFavIcon32x32-removebg-preview.png">
    <style>
        /* =========================================
           VARIÁVEIS DE COR E ESTILOS GLOBAIS
        ========================================= */
        :root {
            --bg-main: #000000;
            --nav-bg: #113c0b; /* Atualizado para o Verde escuro da nova navbar */
            --logo-bg: #d1c115; /* Amarelo do fundo do logo */
            --card-bg: #0e290a; /* Verde escuro dos cards */
            --btn-green: #a7c938; /* Atualizado para o Verde claro dos botões */
            --btn-green-hover: #b8db40;
            --red-cta: #d30018; /* Vermelho do balão */
            --text-white: #FFFFFF;
            --font-main: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Imagens de fundo laterais simuladas */
        .bg-side {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 25vw;
            z-index: -1;
            opacity: 0.3;
            background-size: cover;
            background-position: center;
        }

        .bg-left {
            left: 0;
            background-image: url('https://images.unsplash.com/photo-1490818387583-1b5f2dd061b1?q=80&w=600&auto=format&fit=crop');
            -webkit-mask-image: linear-gradient(to right, black 10%, transparent 100%);
            mask-image: linear-gradient(to right, black 10%, transparent 100%);
        }

        .bg-right {
            right: 0;
            background-image: url('https://images.unsplash.com/photo-1596683839213-9f864bc39294?q=80&w=600&auto=format&fit=crop');
            -webkit-mask-image: linear-gradient(to left, black 10%, transparent 100%);
            mask-image: linear-gradient(to left, black 10%, transparent 100%);
        }

        /* =========================================
           NAVBAR (NOVO PADRÃO)
        ========================================= */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            padding-right: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-wrapper {
            height: 100%;
            background-color: var(--logo-bg);
            padding: 10px 40px 10px 20px;
            border-radius: 0 50px 50px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper img {
            height: 100%;
            width: 165px;
            object-fit: contain;
            margin-right: 12px; /* Adiciona um espaço entre o ícone e o texto */
        }

        .logo-text {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-text span {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-white);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--btn-green);
        }

        .btn-entrar {
            background-color: var(--btn-green);
            color: #113c0b;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-entrar:hover {
            background-color: var(--btn-green-hover);
            transform: scale(1.05);
        }

        /* =========================================
           HERO SECTION
        ========================================= */
        .hero {
            padding-top: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .hero p {
            font-size: 1.3rem;
            font-weight: 400;
            margin-bottom: 60px;
            color: #e0e0e0;
        }

        /* =========================================
           CARDS SECTION
        ========================================= */
        .cards-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
            padding: 0 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 15px;
            width: 320px;
            height: 160px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 2;
        }

        .card h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1;
        }

        .btn-veja {
            background-color: var(--btn-green);
            color: #ffffff;
            border: none;
            padding: 8px 30px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: var(--font-main);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-veja:hover {
            transform: scale(1.05);
            background-color: var(--btn-green-hover);
        }

        /* Local reservado para os Tomatitos nos cards */
        .tomatito-card-placeholder {
            position: absolute;
            right: 0;
            bottom: -15px; /* Permite que a imagem vaze um pouco para baixo */
            width: 140px;
            height: 160px;
            z-index: 1;
            /* background-color: rgba(255, 0, 0, 0.1); Remova o comentário para ver a área reservada */
            pointer-events: none;
        }

        /* =========================================
           FLOATING HELPER
        ========================================= */
        .helper-container {
            position: fixed;
            bottom: 40px;
            right: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .speech-bubble {
            background-color: #000;
            border: 3px solid var(--red-cta);
            border-radius: 50%;
            width: 130px;
            height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            line-height: 1.3;
            position: relative;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* A ponta (cauda) do balão de fala */
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 25px;
            width: 20px;
            height: 20px;
            background: #000;
            border-bottom: 3px solid var(--red-cta);
            border-right: 3px solid var(--red-cta);
            transform: rotate(45deg);
        }

        /* Local reservado para o Tomatito ajudante */
        .tomatito-helper-placeholder {
            width: 100px;
            height: 120px;
            /* background-color: rgba(255, 0, 0, 0.1); Remova o comentário para ver a área reservada */
        }

    </style>
</head>
<body>

    <!-- Imagens de fundo simuladas nas laterais -->
    <div class="bg-side bg-left"></div>
    <div class="bg-side bg-right"></div>

    <!-- NAVBAR Fiel ao Novo Padrão -->
    <nav class="navbar">
        <div class="logo-wrapper">
            <!-- Caminho partindo da raiz -->
            <img src="assets/personalFood/PersonalFoodIcon.png" alt="Personal Food Icon">
            <div class="logo-text">
                PERSONAL<span>FOOD</span>
            </div>
        </div>
        
        <ul class="nav-links">
            <li><a href="sections/chefs.html">Chef 's</a></li>
            <li><a href="sections/cursos.html">Cursos</a></li>
            <li><a href="sections/receitas.html">Receitas</a></li>
            <li><a href="sections/impacta.html">PF Impacta</a></li>
            <li><a href="sections/sobre.html">Sobre nós</a></li>
        </ul>

        <button class="btn-entrar">Entrar</button>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="hero">
        <h1>Nós temos o chefe certo para você!</h1>
        <p>Você descreve, a gente entende, o chefe ideal aparece!</p>

        <div class="cards-wrapper">
            <!-- Card 1 -->
            <div class="card">
                <div class="card-content">
                    <h2>Chef 's</h2>
                    <a href="sections/chefs.html" class="btn-veja">Veja!</a>
                </div>
                <!-- Placeholder para o Tomatito -->
                <div class="tomatito-card-placeholder"></div>
            </div>

            <!-- Card 2 -->
            <div class="card">
                <div class="card-content">
                    <h2>Cursos</h2>
                    <a href="sections/cursos.html" class="btn-veja">Veja!</a>
                </div>
                <!-- Placeholder para o Tomatito -->
                <div class="tomatito-card-placeholder"></div>
            </div>

            <!-- Card 3 -->
            <div class="card">
                <div class="card-content">
                    <h2>Receitas</h2>
                    <a href="sections/receitas.html" class="btn-veja">Veja!</a>
                </div>
                <!-- Placeholder para o Tomatito -->
                <div class="tomatito-card-placeholder"></div>
            </div>
        </div>
    </main>

    <!-- HELPER FLUTUANTE (Tomatito) -->
    <div class="helper-container">
        <div class="speech-bubble">
            Oi eu sou o Tomatito<br>Precisa de ajuda?
        </div>
        <!-- Placeholder para o Tomatito Ajudante -->
        <div class="tomatito-helper-placeholder"></div>
    </div>

</body>
</html>
