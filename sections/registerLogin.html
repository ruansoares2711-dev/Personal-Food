<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Food | Login e Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/personalFood/PersonalFoodFavIcon32x32-removebg-preview.png">
    <style>
        /* =========================================
           VARIÁVEIS DE COR E ESTILOS GLOBAIS
        ========================================= */
        :root {
            --bg-main: #000000;
            --nav-bg: #113c0b;
            --logo-bg: #d1c115;
            --card-bg: #0e290a;
            --btn-green: #a7c938;
            --btn-green-hover: #b8db40;
            --red-cta: #d30018;
            --text-white: #FFFFFF;
            --font-main: 'Poppins', sans-serif;
            --input-bg: rgba(0, 0, 0, 0.4);
            --border-color: #2a5a22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Imagens de fundo laterais simuladas */
        .bg-side {
            position: fixed;
            top: 0;
            bottom: 0;
            width: 25vw;
            z-index: -1;
            opacity: 0.3;
            background-size: cover;
            background-position: center;
        }

        .bg-left {
            left: 0;
            background-image: url('https://images.unsplash.com/photo-1490818387583-1b5f2dd061b1?q=80&w=600&auto=format&fit=crop');
            -webkit-mask-image: linear-gradient(to right, black 10%, transparent 100%);
            mask-image: linear-gradient(to right, black 10%, transparent 100%);
        }

        .bg-right {
            right: 0;
            background-image: url('https://images.unsplash.com/photo-1596683839213-9f864bc39294?q=80&w=600&auto=format&fit=crop');
            -webkit-mask-image: linear-gradient(to left, black 10%, transparent 100%);
            mask-image: linear-gradient(to left, black 10%, transparent 100%);
        }

        /* =========================================
           NAVBAR
        ========================================= */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            padding-right: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .logo-wrapper {
            height: 100%;
            background-color: var(--logo-bg);
            padding: 10px 40px 10px 20px;
            border-radius: 0 50px 50px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper img {
            height: 100%;
            width: 165px;
            object-fit: contain;
            margin-right: 12px;
        }

        .logo-text {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-text span {
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-white);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--btn-green);
        }

        .btn-entrar {
            background-color: var(--btn-green);
            color: #113c0b;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-entrar:hover {
            background-color: var(--btn-green-hover);
            transform: scale(1.05);
        }

        /* =========================================
           AUTH SECTION (LOGIN / REGISTRO)
        ========================================= */
        .auth-section {
            padding-top: 120px;
            padding-bottom: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 10;
        }

        .auth-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        /* Tabs de navegação (Entrar / Cadastrar) */
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: #88a483; /* Cor inativa */
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .auth-tab.active {
            color: var(--btn-green);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--btn-green);
            border-radius: 3px 3px 0 0;
        }

        /* Formulários */
        .auth-form {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-form h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            font-weight: 800;
            text-align: center;
        }

        /* Inputs e Labels */
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e0e0e0;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-white);
            font-family: var(--font-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: var(--btn-green);
            box-shadow: 0 0 8px rgba(167, 201, 56, 0.3);
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Customizando lista suspensa (Select) para não ficar branca */
        .input-group select option {
            background-color: var(--card-bg);
            color: var(--text-white);
        }

        /* Input de Arquivo Customizado (Foto) */
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        .btn-file {
            display: block;
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            border: 1px dashed var(--btn-green);
            border-radius: 10px;
            color: var(--text-white);
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-file:hover {
            background-color: rgba(167, 201, 56, 0.1);
        }

        /* Botão principal de formulário */
        .btn-submit {
            width: 100%;
            background-color: var(--btn-green);
            color: #113c0b;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--btn-green-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(167, 201, 56, 0.3);
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
            display: block;
            color: #a0a0a0;
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: var(--btn-green);
            text-decoration: underline;
        }

        /* Responsividade Básica */
        @media (max-width: 900px) {
            .nav-links { display: none; } /* Esconde links no mobile por simplicidade */
            .logo-wrapper { border-radius: 0; padding-right: 20px; }
            .bg-side { display: none; }
        }
        
        @media (max-width: 550px) {
            .auth-container { border-radius: 0; box-shadow: none; padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <!-- Imagens de fundo simuladas nas laterais -->
    <div class="bg-side bg-left"></div>
    <div class="bg-side bg-right"></div>

    <!-- NAVBAR Fiel ao Novo Padrão -->
    <nav class="navbar">
        <div class="logo-wrapper">
            <!-- Caminho partindo da raiz -->
            <img src="../assets/personalFood/PersonalFoodIcon.png" alt="Personal Food Icon">
            <div class="logo-text">
                PERSONAL<span>FOOD</span>
            </div>
        </div>
        
        <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="chefs.html">Chef 's</a></li>
            <li><a href="cursos.html">Cursos</a></li>
            <li><a href="receitas.html">Receitas</a></li>
            <li><a href="impacta.html">PF Impacta</a></li>
            <li><a href="sobre.html">Sobre nós</a></li>
        </ul>

        <button class="btn-entrar" onclick="location.href='registerLogin.html'">Entrar</button>
    </nav>

    <!-- CONTEÚDO PRINCIPAL (AUTH) -->
    <main class="auth-section">
        <div class="auth-container">
            
            <!-- Guias de Navegação -->
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="toggleAuth('login')">Entrar</div>
                <div class="auth-tab" id="tab-register" onclick="toggleAuth('register')">Cadastrar</div>
            </div>

            <!-- Formulário de LOGIN -->
            <form id="form-login" class="auth-form active" onsubmit="event.preventDefault();">
                <h2>Bem-vindo de volta!</h2>
                
                <div class="input-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="input-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-submit">Acessar Conta</button>
                <a href="#" class="forgot-password">Esqueceu sua senha?</a>
            </form>

            <!-- Formulário de REGISTRO -->
            <form id="form-register" class="auth-form" onsubmit="event.preventDefault();">
                <h2>Junte-se a nós!</h2>
                
                <div class="input-group">
                    <label for="reg-name">Nome Completo / Nome do Chef</label>
                    <input type="text" id="reg-name" placeholder="Como devemos te chamar?" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="seu.melhor@email.com" required>
                </div>

                <div class="input-group">
                    <label for="reg-specialty">Especialidade Principal</label>
                    <select id="reg-specialty" required>
                        <option value="" disabled selected>Selecione sua especialidade</option>
                        <option value="confeitaria">Confeitaria & Doces</option>
                        <option value="brasileira">Cozinha Brasileira</option>
                        <option value="churrasco">Churrasco & Carnes</option>
                        <option value="vegana">Comida Vegana / Vegetariana</option>
                        <option value="massas">Massas & Cozinha Italiana</option>
                        <option value="oriental">Cozinha Oriental</option>
                        <option value="fit">Cozinha Fit / Saudável</option>
                        <option value="outro">Outro (Geral)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="reg-bio">Apresentação</label>
                    <textarea id="reg-bio" placeholder="Conte-nos um pouco sobre você e sua paixão pela culinária..." required></textarea>
                </div>

                <div class="input-group">
                    <label>Foto de Perfil</label>
                    <div class="file-input-wrapper">
                        <button type="button" class="btn-file" id="fileNameDisplay">📸 Escolher Foto...</button>
                        <input type="file" id="reg-photo" accept="image/*" onchange="updateFileName(this)">
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">Senha</label>
                    <input type="password" id="reg-password" placeholder="Crie uma senha forte" required>
                </div>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>

        </div>
    </main>

    <!-- SCRIPT DE INTERATIVIDADE -->
    <script>
        // Função para alternar entre Login e Cadastro
        function toggleAuth(type) {
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (type === 'login') {
                formLogin.classList.add('active');
                formRegister.classList.remove('active');
                
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
            } else {
                formRegister.classList.add('active');
                formLogin.classList.remove('active');
                
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
            }
        }

        // Atualizar o texto do botão de arquivo com o nome da imagem selecionada
        function updateFileName(input) {
            const displayBtn = document.getElementById('fileNameDisplay');
            if (input.files && input.files[0]) {
                displayBtn.innerText = "✅ " + input.files[0].name;
                displayBtn.style.borderColor = "var(--btn-green)";
                displayBtn.style.color = "var(--btn-green)";
            } else {
                displayBtn.innerText = "📸 Escolher Foto...";
                displayBtn.style.borderColor = "var(--btn-green)";
                displayBtn.style.color = "var(--text-white)";
            }
        }
    </script>
</body>
</html>
